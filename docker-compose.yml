services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file outside the container
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/training_logs.sqlite3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # At build time, point the frontend at the backend
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data: